# Reusable broken-link checker (lychee) for al-folio / Jekyll sites.
# Builds the site and checks local links offline.
name: Broken links (reusable)

on:
  workflow_call:
    inputs:
      runtime:
        description: "jekyll | node"
        type: string
        required: false
        default: "jekyll"
      build-cmd:
        type: string
        required: false
        default: "bundle exec jekyll build"
      site-dir:
        type: string
        required: false
        default: "_site"
      ruby-version:
        type: string
        required: false
        default: "3.3.5"
      node-version:
        type: string
        required: false
        default: "20"

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner 🛡️
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout 🛎️
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Setup Ruby
        if: inputs.runtime == 'jekyll'
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true
      - name: Setup Node ⚙️
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
      - name: Update _config.yml ⚙️
        if: inputs.runtime == 'jekyll'
        uses: fjogeleit/yaml-update-action@dffe9a5223d84653c13374032382f6bb5de8e5ef # v0.17.0
        with:
          commitChange: false
          valueFile: "_config.yml"
          changes: |
            {
              "giscus.repo": "${{ github.repository }}",
              "baseurl": ""
            }
      - name: Jekyll build deps 🔧
        if: inputs.runtime == 'jekyll'
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade jupyter
      - name: Node install 🔧
        if: inputs.runtime == 'node'
        run: npm ci || npm install
      - name: Build 🏗️
        run: |
          export JEKYLL_ENV=production
          ${{ inputs.build-cmd }}
      - name: Purge unused CSS 🧹
        if: inputs.runtime == 'jekyll'
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          fail: true
          args: --offline --remap '${{ inputs.site-dir }}(/?.*)/assets/(.*) ${{ inputs.site-dir }}/assets/$2' --verbose --no-progress '${{ inputs.site-dir }}/**/*.html'
