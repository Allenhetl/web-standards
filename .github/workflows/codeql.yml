# Reusable CodeQL analysis. Languages are configurable per site.
name: CodeQL (reusable)

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of {language,build-mode}, e.g. [{"language":"javascript-typescript","build-mode":"none"}]'
        type: string
        required: false
        default: '[{"language":"javascript-typescript","build-mode":"none"},{"language":"ruby","build-mode":"none"}]'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.languages) }}
    steps:
      - name: Harden runner 🛡️
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
