# Reusable Prettier format check. Fails if any file is not formatted.
# On a failing pull_request it uploads an HTML diff artifact and posts a
# sticky PR comment linking to it — provided the caller grants
# `pull-requests: write`, e.g.:
#
#   jobs:
#     prettier:
#       permissions:
#         contents: read
#         pull-requests: write
#       uses: Allenhetl/web-standards/.github/workflows/format-check.yml@main
name: Format check (reusable)

on:
  workflow_call:
    inputs:
      prettier-packages:
        description: "Exact-pinned Prettier + plugin packages to install. Pinned so formatting is deterministic — an unpinned 'latest' plugin reformats files differently across runs and breaks CI unpredictably."
        type: string
        required: false
        default: "prettier@3.8.4 @shopify/prettier-plugin-liquid@1.10.3"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
      - name: Install Prettier 💾
        run: npm install --save-dev --save-exact ${{ inputs.prettier-packages }}
      - name: Prettier Check 🔎
        id: prettier
        run: npx prettier . --check
      - name: Create diff 📝
        if: ${{ failure() }}
        run: |
          npx prettier . --write
          git diff -- . ':(exclude)package-lock.json' ':(exclude)package.json' > diff.txt
          npm install -g diff2html-cli
          diff2html -i file -s side -F diff.html -- diff.txt
      - name: Upload html diff ⬆️
        id: artifact-upload
        if: ${{ failure() && steps.prettier.conclusion == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: HTML Diff
          path: diff.html
          retention-days: 7
      - name: Comment on PR 💬
        # Posts directly (no repository_dispatch hop). Needs the caller to
        # grant pull-requests: write; silently no-ops otherwise.
        if: ${{ failure() && steps.prettier.conclusion == 'failure' && github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: thollander/actions-comment-pull-request@v2
        with:
          comment_tag: prettier-failed
          message: |
            Failed [prettier code check](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}). Download the [HTML diff artifact](${{ steps.artifact-upload.outputs.artifact-url }}) to see what needs formatting. Run `npx prettier . --write` locally to fix.
