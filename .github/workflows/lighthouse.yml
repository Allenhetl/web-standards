# Reusable Lighthouse CI. Builds the Jekyll site, serves it, and audits
# performance / accessibility / best-practices / SEO against thresholds.
name: Lighthouse (reusable)

on:
  workflow_call:
    inputs:
      runtime:
        description: "jekyll | node"
        type: string
        required: false
        default: "jekyll"
      build-cmd:
        type: string
        required: false
        default: "bundle exec jekyll build"
      site-dir:
        type: string
        required: false
        default: "_site"
      ruby-version:
        type: string
        required: false
        default: "3.3.5"
      node-version:
        type: string
        required: false
        default: "20"
      paths:
        description: "Newline- or space-separated site paths to audit"
        type: string
        required: false
        default: "/"
      min-performance:
        type: number
        required: false
        default: 0.9
      min-accessibility:
        type: number
        required: false
        default: 0.9
      min-best-practices:
        type: number
        required: false
        default: 0.9
      min-seo:
        type: number
        required: false
        default: 0.9

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner 🛡️
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Ruby
        if: inputs.runtime == 'jekyll'
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true
      - name: Setup Node ⚙️
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Update _config.yml ⚙️
        if: inputs.runtime == 'jekyll'
        uses: fjogeleit/yaml-update-action@dffe9a5223d84653c13374032382f6bb5de8e5ef # v0.17.0
        with:
          commitChange: false
          valueFile: "_config.yml"
          changes: |
            {
              "giscus.repo": "${{ github.repository }}",
              "baseurl": ""
            }
      - name: Jekyll build deps 🔧
        if: inputs.runtime == 'jekyll'
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade jupyter
      - name: Node install 🔧
        if: inputs.runtime == 'node'
        run: npm ci || npm install
      - name: Build 🏗️
        run: |
          export JEKYLL_ENV=production
          ${{ inputs.build-cmd }}
      - name: Purge unused CSS 🧹
        if: inputs.runtime == 'jekyll'
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Serve site 🌐
        run: |
          npm install -g http-server
          http-server ${{ inputs.site-dir }}/ -p 8080 &
          sleep 3
      - name: Build LHCI URL list 🔧
        id: urls
        run: |
          urls=""
          for p in ${{ inputs.paths }}; do
            urls="$urls http://localhost:8080${p}"
          done
          echo "list=$urls" >> "$GITHUB_OUTPUT"
      - name: Run Lighthouse 🔦
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          urls: ${{ steps.urls.outputs.list }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
          # Assertions enforced below via a generated config.
      - name: Enforce thresholds ✅
        run: |
          node -e '
            const fs=require("fs");
            const dir=".lighthouseci";
            if(!fs.existsSync(dir)){console.log("no LHCI output; skipping");process.exit(0)}
            const files=fs.readdirSync(dir).filter(f=>f.startsWith("lhr-")&&f.endsWith(".json"));
            const min={performance:${{ inputs.min-performance }},accessibility:${{ inputs.min-accessibility }},"best-practices":${{ inputs.min-best-practices }},seo:${{ inputs.min-seo }}};
            let bad=false;
            for(const f of files){
              const r=JSON.parse(fs.readFileSync(dir+"/"+f));
              for(const k of Object.keys(min)){
                const s=r.categories[k]?.score;
                if(s!=null&&s<min[k]){console.log(`FAIL ${r.finalUrl} ${k}=${s} < ${min[k]}`);bad=true}
              }
            }
            process.exit(bad?1:0);
          '
