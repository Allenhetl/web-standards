# Reusable accessibility workflow (axe-core) for al-folio / Jekyll sites.
# Call from a site with:
#
#   jobs:
#     axe:
#       uses: Allenhetl/web-standards/.github/workflows/accessibility.yml@main
#       with:
#         url: "blog/"        # optional path to check
name: Accessibility (reusable)

on:
  workflow_call:
    inputs:
      url:
        description: "Path to check, relative to site root (e.g. 'blog/')"
        type: string
        required: false
        default: ""
      runtime:
        description: "jekyll | node"
        type: string
        required: false
        default: "jekyll"
      build-cmd:
        type: string
        required: false
        default: "bundle exec jekyll build"
      site-dir:
        type: string
        required: false
        default: "_site"
      ruby-version:
        type: string
        required: false
        default: "3.3.5"
      node-version:
        type: string
        required: false
        default: "20"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner 🛡️
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout 🛎️
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Setup Ruby
        if: inputs.runtime == 'jekyll'
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true
      - name: Setup Node ⚙️
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
      - name: Update _config.yml ⚙️
        if: inputs.runtime == 'jekyll'
        uses: fjogeleit/yaml-update-action@dffe9a5223d84653c13374032382f6bb5de8e5ef # v0.17.0
        with:
          commitChange: false
          valueFile: "_config.yml"
          changes: |
            {
              "giscus.repo": "${{ github.repository }}",
              "baseurl": ""
            }
      - name: Jekyll build deps 🔧
        if: inputs.runtime == 'jekyll'
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade jupyter
      - name: Node install 🔧
        if: inputs.runtime == 'node'
        run: npm ci || npm install
      - name: Build 🏗️
        run: |
          export JEKYLL_ENV=production
          ${{ inputs.build-cmd }}
      - name: Purge unused CSS 🧹
        if: inputs.runtime == 'jekyll'
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Get Chromium version 🌐
        run: |
          CHROMIUM_VERSION=$(wget -qO- https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_STABLE | cut -d. -f1)
          echo "Chromium version: $CHROMIUM_VERSION"
          echo "CHROMIUM_VERSION=$CHROMIUM_VERSION" >> $GITHUB_ENV
      - name: Setup Chrome 🌐
        id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: ${{ env.CHROMIUM_VERSION }}
      - name: Install chromedriver 🚗
        run: npm install -g chromedriver@$CHROMIUM_VERSION
      - name: Run axe 🪓
        run: |
          npm install -g @axe-core/cli
          npm install -g http-server
          http-server ${{ inputs.site-dir }}/ &
          axe --chromedriver-path $(npm root -g)/chromedriver/bin/chromedriver http://localhost:8080/${{ inputs.url }} --load-delay=1500 --exit
