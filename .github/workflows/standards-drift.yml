# Reusable drift check. Fails the build if a site's root files have drifted
# from the authoritative copies in the web-standards submodule. This is the
# contract behind the pre-commit auto-sync — it catches --no-verify commits
# and machines that never installed the hook.
#
# It compares against the submodule version the site has PINNED (no
# --remote update), so a red build always means "you tampered with a root
# file", never merely "a newer standard exists". Upgrading to a newer
# standard is a deliberate `git submodule update --remote` the site owner
# runs; being behind never fails CI on its own.
name: Standards drift (reusable)

on:
  workflow_call:
    inputs:
      submodule-path:
        description: "Path to the web-standards submodule in the site repo"
        type: string
        required: false
        default: "standards"

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner 🛡️
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout (with pinned submodule) 🛎️
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Check for drift 🔍
        run: bash "${{ inputs.submodule-path }}/bin/check-drift.sh"
